name: Sync version numbers

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "patch=$PATCH" >> "$GITHUB_OUTPUT"

      - name: Update version in LaTeX document
        run: |
          MAJOR="${{ steps.version.outputs.major }}"
          MINOR="${{ steps.version.outputs.minor }}"
          PATCH="${{ steps.version.outputs.patch }}"
          sed -i "s/\\\\version{[0-9]*}{[0-9]*}{[0-9]*}/\\\\version{$MAJOR}{$MINOR}{$PATCH}/" PurePy-spec.tex

      - name: Update version in README
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          sed -i "s|## \[v[0-9]*\.[0-9]*\.[0-9]*\](https://github.com/pure-py/pure-py-spec/releases/download/v[0-9]*\.[0-9]*\.[0-9]*/PurePy-spec.pdf)|## [$TAG](https://github.com/pure-py/pure-py-spec/releases/download/$TAG/PurePy-spec.pdf)|" README.md

      - name: Commit and push version changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PurePy-spec.tex README.md
          git diff --cached --quiet || git commit -m "Sync version to ${{ steps.version.outputs.tag }}"
          git pull --rebase origin main
          git push origin HEAD:refs/heads/main
